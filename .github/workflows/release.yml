name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Verify version files match tag
        run: node tools/verify-release-version.mjs "${{ steps.meta.outputs.tag }}"

  frontend-gate:
    name: Frontend release gate
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  rust-gate:
    name: Rust release gate
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Test
        working-directory: src-tauri
        run: cargo test

  prepare-release:
    name: Prepare GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate
      - frontend-gate
      - rust-gate
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Create release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.validate.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ## 安装提醒

          这是 MapX 的自动更新发布版本，应用会使用签名的 updater artifacts 校验更新来源。

          如果自动更新不可用，仍可手动下载安装包作为兜底方式：

          - macOS 可能提示 "MapX is damaged and can't be opened"。这是未签名、未公证测试版被 Gatekeeper 拦截导致的。把 MapX 拖入 Applications 后，可在 Terminal 执行：

            ```sh
            xattr -dr com.apple.quarantine /Applications/MapX.app
            open /Applications/MapX.app
            ```

          - Windows 可能出现 SmartScreen 提示，需要用户手动确认继续安装。
          - 百度地图能力需要在应用设置中配置自己的百度地图开放平台 AK。
          - MapX 数据保存在系统 app data 目录；升级前建议确认自动备份目录中已有近期备份。

          EOF

          gh api "repos/${REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}" \
            -f target_commitish="${TAG_NAME}" \
            --jq .body >> release-notes.md

      - name: Create or update GitHub release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.validate.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          if gh release view "${TAG_NAME}" --repo "${REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --repo "${REPOSITORY}" \
              --title "MapX ${TAG_NAME}" \
              --notes-file release-notes.md \
              --prerelease=false
          else
            gh release create "${TAG_NAME}" \
              --repo "${REPOSITORY}" \
              --title "MapX ${TAG_NAME}" \
              --notes-file release-notes.md \
              --verify-tag
          fi

          RELEASE_ID="$(gh release view "${TAG_NAME}" --repo "${REPOSITORY}" --json id --jq .id)"
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

  build-macos-release:
    name: Build release (macOS)
    runs-on: macos-latest
    needs:
      - validate
      - prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned macOS DMG
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri:build

      - name: Upload macOS bundles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          gh release upload "${TAG_NAME}" src-tauri/target/release/bundle/dmg/MapX_${VERSION}_*.dmg --clobber
          gh release upload "${TAG_NAME}" src-tauri/target/release/bundle/macos/*.app.tar.gz --clobber
          gh release upload "${TAG_NAME}" src-tauri/target/release/bundle/macos/*.app.tar.gz.sig --clobber

  build-windows-release:
    name: Build release (Windows)
    runs-on: windows-latest
    needs:
      - validate
      - prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and upload Windows MSI
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ needs.validate.outputs.tag }}
          releaseDraft: false
          prerelease: false
          args: --ci --bundles msi
          includeUpdaterJson: false
          retryAttempts: 2

  publish-updater-json:
    name: Publish updater manifest
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-macos-release
      - build-windows-release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Build updater latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          mkdir -p updater-signatures
          gh release download "${TAG_NAME}" --repo "${REPOSITORY}" --pattern "*.sig" --dir updater-signatures --clobber
          gh release view "${TAG_NAME}" --repo "${REPOSITORY}" --json assets,publishedAt,body > release-metadata.json
          node tools/create-updater-latest-json.mjs release-metadata.json updater-signatures latest.json
          gh release upload "${TAG_NAME}" latest.json --repo "${REPOSITORY}" --clobber
