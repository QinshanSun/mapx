name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Verify version files match tag
        run: node tools/verify-release-version.mjs "${{ steps.meta.outputs.tag }}"

  frontend-gate:
    name: Frontend release gate
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  rust-gate:
    name: Rust release gate
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Test
        working-directory: src-tauri
        run: cargo test

  prepare-release:
    name: Prepare GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate
      - frontend-gate
      - rust-gate
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Create release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.validate.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ## 安装提醒

          这是 MapX 的 stable 发布版本。应用内自动更新会使用签名 updater 产物；如果自动更新不可用，仍可手动下载安装包。

          - macOS 手动安装包仍可能提示 "MapX is damaged and can't be opened"。这是未签名、未公证测试版被 Gatekeeper 拦截导致的。把 MapX 拖入 Applications 后，可在 Terminal 执行：

            ```sh
            xattr -dr com.apple.quarantine /Applications/MapX.app
            open /Applications/MapX.app
            ```

          - Windows 可能出现 SmartScreen 提示，需要用户手动确认继续安装。
          - 百度地图能力需要在应用设置中配置自己的百度地图开放平台 AK。
          - MapX 数据保存在系统 app data 目录；升级前建议确认自动备份目录中已有近期备份。

          EOF

          gh api "repos/${REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}" \
            -f target_commitish="${TAG_NAME}" \
            --jq .body >> release-notes.md

      - name: Create or update GitHub release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.validate.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          if gh release view "${TAG_NAME}" --repo "${REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --repo "${REPOSITORY}" \
              --title "MapX ${TAG_NAME}" \
              --notes-file release-notes.md \
              --draft=false \
              --prerelease=false \
              --latest
          else
            gh release create "${TAG_NAME}" \
              --repo "${REPOSITORY}" \
              --title "MapX ${TAG_NAME}" \
              --notes-file release-notes.md \
              --latest \
              --verify-tag
          fi

          RELEASE_ID="$(gh release view "${TAG_NAME}" --repo "${REPOSITORY}" --json id --jq .id)"
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

  build-macos-release:
    name: Build release (macOS)
    runs-on: macos-latest
    needs:
      - validate
      - prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG and signed updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Upload macOS release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          mkdir -p updater-fragments
          UPDATER_ARCH="$(uname -m)"
          if [ "${UPDATER_ARCH}" = "arm64" ]; then
            UPDATER_ARCH="aarch64"
          fi

          UPDATER_FILE="$(find src-tauri/target/release/bundle/macos -name '*.app.tar.gz' -print -quit)"
          SIGNATURE_FILE="${UPDATER_FILE}.sig"
          if [ ! -f "${UPDATER_FILE}" ] || [ ! -f "${SIGNATURE_FILE}" ]; then
            echo "Missing macOS updater artifact or signature" >&2
            find src-tauri/target/release/bundle -maxdepth 3 -type f >&2
            exit 1
          fi

          gh release upload "${TAG_NAME}" \
            src-tauri/target/release/bundle/dmg/MapX_${VERSION}_*.dmg \
            "${UPDATER_FILE}" \
            "${SIGNATURE_FILE}" \
            --clobber

          node tools/create-updater-fragment.mjs \
            --repo "${REPOSITORY}" \
            --tag "${TAG_NAME}" \
            --artifact "${UPDATER_FILE}" \
            --signature "${SIGNATURE_FILE}" \
            --target "darwin-${UPDATER_ARCH}-app" \
            --target "darwin-${UPDATER_ARCH}" \
            --output updater-fragments/macos.json

      - name: Upload macOS updater fragment
        uses: actions/upload-artifact@v4
        with:
          name: updater-fragment-macos
          path: updater-fragments/macos.json

  build-windows-release:
    name: Build release (Windows)
    runs-on: windows-latest
    needs:
      - validate
      - prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows MSI and signed updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --ci --bundles msi

      - name: Upload Windows release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.validate.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path updater-fragments | Out-Null
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle/msi -Filter *.msi | Select-Object -First 1
          if (-not $msi) {
            Write-Error "Missing Windows MSI artifact"
          }

          $signature = Get-Item "$($msi.FullName).sig"
          gh release upload "$env:TAG_NAME" $msi.FullName $signature.FullName --clobber

          node tools/create-updater-fragment.mjs `
            --repo "$env:REPOSITORY" `
            --tag "$env:TAG_NAME" `
            --artifact $msi.FullName `
            --signature $signature.FullName `
            --target "windows-x86_64-msi" `
            --target "windows-x86_64" `
            --output updater-fragments/windows.json

      - name: Upload Windows updater fragment
        uses: actions/upload-artifact@v4
        with:
          name: updater-fragment-windows
          path: updater-fragments/windows.json

  publish-updater-manifest:
    name: Publish updater manifest
    runs-on: ubuntu-latest
    needs:
      - validate
      - prepare-release
      - build-macos-release
      - build-windows-release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Download updater fragments
        uses: actions/download-artifact@v4
        with:
          pattern: updater-fragment-*
          path: updater-fragments
          merge-multiple: true

      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          gh release view "${TAG_NAME}" --json body --jq .body > release-body.md
          PUBLISHED_AT="$(gh release view "${TAG_NAME}" --json publishedAt --jq .publishedAt)"

          node tools/build-updater-manifest.mjs \
            --version "${VERSION}" \
            --pub-date "${PUBLISHED_AT}" \
            --notes-file release-body.md \
            --fragments updater-fragments \
            --output latest.json

          gh release upload "${TAG_NAME}" latest.json --clobber
